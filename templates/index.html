<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>TODO</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
        <style>
            body {
                background: linear-gradient(to right, #ff0000, #0000ff);
            }
            .w3-card-4 {
                display: inline-block;
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: white;
                border-radius: 20px;
                border: 1px solid #000;
                padding: 10px;
            }
            .container {
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
            }
            #popupContainer {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-color: rgba(0, 0, 0, 0.5);
                z-index: 9999;
            }
            #popupContent {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background-color: #fff;
                padding: 20px;
            }
            #closeButton {
                margin-top: 10px;
            }
            .todo-item {
                border-radius: 5px;
                border: 1px solid #000;
                padding: 10px;
                background-color: whitesmoke;
                margin-bottom: 6px;
            }
            .todo-item-complete {
                border-radius: 5px;
                border: 1px solid #000;
                padding: 10px;
                background-color: green;
                color: white;
                margin-bottom: 6px;
            }
            .inline-form {
                display: inline;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="w3-card-4" style="margin:auto">
                <div class="datetime"></div>
                <header class="w3-container w3-light-grey">
                    <h3>To Do List</h3>
                </header>
                <form action="{{ url_for('todo.create_todo') }}" method="POST">
                    <div class="w3-container">
                        <label for="title">Add Your Task Here</label>
                        <input class="w3-input w3-border" type="text" name="title" placeholder="Enter Todo.." required>
                        <button class="w3-button w3-circle w3-black" type="submit">+</button>
                    </div>
                </form>

                {% for todo in todo_list %}
                    {% if not todo['complete'] %}
                        <div class="todo-item">
                            <p id="{{ todo['id'] }}">{{ todo['title'] }}</p>
                            <form class="inline-form" action="{{ url_for('todo.complete_todo', todo_id=todo['id']) }}" method="POST">
                                <button type="submit"><i class="fa fa-check"></i></button>
                            </form>
                            <button type="button" onclick="openPopup('{{ todo['id'] }}')"><i class="fa fa-pencil"></i></button>
                            <form class="inline-form" action="{{ url_for('todo.delete_todo', todo_id=todo['id']) }}" method="POST">
                                <button type="submit"><i class="fa fa-trash-o"></i></button>
                            </form>
                        </div>
                    {% else %}
                        <div class="todo-item-complete">
                            <p id="{{ todo['id'] }}"><del>{{ todo['title'] }}</del></p>
                            <button type="button" onclick="openPopup('{{ todo['id'] }}')"><i class="fa fa-pencil"></i></button>
                            <form class="inline-form" action="{{ url_for('todo.delete_todo', todo_id=todo['id']) }}" method="POST">
                                <button type="submit"><i class="fa fa-trash-o"></i></button>
                            </form>
                        </div>
                    {% endif %}
                {% endfor %}
            </div>
        </div>

        <div id="popupContainer">
            <div id="popupContent">
                <form action="{{ url_for('todo.update_todo') }}" method="POST">
                    <input type="hidden" id="todoIdField" name="todo_id">
                    <input type="text" id="titleField" placeholder="Enter text" name="title" required>
                    <button id="closeButton" type="submit">Update</button>
                </form>
            </div>
        </div>

        <script>
            function updateDateTime() {
                const datetimeElement = document.querySelector('.datetime');
                const currentDateTime = new Date();
                datetimeElement.innerHTML = currentDateTime.toLocaleString();
            }

            updateDateTime();
            setInterval(updateDateTime, 1000);

            function openPopup(todoId) {
                const displayText = document.getElementById(todoId).textContent;
                const titleField = document.getElementById('titleField');
                const todoIdField = document.getElementById('todoIdField');
                titleField.value = displayText;
                todoIdField.value = todoId;
                document.getElementById('popupContainer').style.display = 'block';
            }
        </script>
    </body>
</html>
